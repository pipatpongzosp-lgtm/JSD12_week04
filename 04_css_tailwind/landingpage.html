<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mystery Hotel</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans antialiased">

  <nav class="absolute w-full z-20 top-0 left-0 flex justify-between items-center p-6 text-white">
    <div class="text-2xl font-bold tracking-wider uppercase">Mystery</div>
    <ul class="hidden md:flex space-x-8 font-medium">
      <li><a href="#" class="hover:text-gray-300 transition">Rooms</a></li>
      <li><a href="#" class="hover:text-gray-300 transition">Amenities</a></li>
      <li><a href="#" class="hover:text-gray-300 transition">Contact</a></li>
    </ul>
  </nav>

  <header class="relative h-screen flex flex-col items-center justify-center bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1542314831-c6a4d14d8373?q=80&w=2070&auto=format&fit=crop');">
    <div class="absolute inset-0 bg-black/40 z-0"></div>
    
    <div class="relative z-10 text-center px-4 mt-20">
      <h1 class="text-5xl md:text-7xl font-bold text-white mb-6 drop-shadow-lg">Escape to Tranquility</h1>
      <p class="text-xl md:text-2xl text-gray-100 mb-10 max-w-2xl mx-auto drop-shadow">Discover the perfect blend of luxury, comfort, and breathtaking views.</p>
    </div>

    <div class="relative z-10 bg-white p-4 md:p-6 rounded-lg shadow-2xl flex flex-col md:flex-row gap-4 items-end max-w-4xl w-11/12 mx-auto translate-y-10">
      <div class="w-full md:w-1/4">
        <label class="block text-sm font-semibold text-gray-700 mb-1">Check In</label>
        <input type="date" class="w-full border border-gray-300 rounded p-2 focus:ring-2 focus:ring-slate-800 outline-none">
      </div>
      <div class="w-full md:w-1/4">
        <label class="block text-sm font-semibold text-gray-700 mb-1">Check Out</label>
        <input type="date" class="w-full border border-gray-300 rounded p-2 focus:ring-2 focus:ring-slate-800 outline-none">
      </div>
      <div class="w-full md:w-1/4">
        <label class="block text-sm font-semibold text-gray-700 mb-1">Guests</label>
        <select class="w-full border border-gray-300 rounded p-2 focus:ring-2 focus:ring-slate-800 outline-none bg-white">
          <option>1 Adult</option>
          <option>2 Adults</option>
          <option>Family</option>
        </select>
      </div>
      <div class="w-full md:w-1/4">
        <button class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-2.5 px-4 rounded transition duration-300">
          Check Availability
        </button>
      </div>
    </div>
  </header>

</body>
</html>
